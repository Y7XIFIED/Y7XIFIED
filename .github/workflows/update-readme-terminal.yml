name: Update Readme Terminal GIF

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-terminal-gif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install github-readme-terminal
        run: |
          python -m pip install --upgrade pip
          pip install github-readme-terminal

      - name: Generate terminal GIF
        run: python scripts/generate_terminal_gif.py

      - name: Commit terminal GIF if changed
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update readme terminal gif"
          file_pattern: assets/readme-terminal.gif

