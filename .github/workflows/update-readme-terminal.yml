name: Update Readme Terminal GIF

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:

concurrency:
  group: profile-readme-updates
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-terminal-gif:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install github-readme-terminal
        run: |
          python -m pip install --upgrade pip
          pip install github-readme-terminal

      - name: Generate terminal GIF
        run: python scripts/generate_terminal_gif.py

      - name: Commit terminal GIF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/readme-terminal.gif
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update readme terminal gif"
          git pull --rebase origin main
          git push origin HEAD:main
