name: Update DBuzatto Terminal GIF

on:
  schedule:
    - cron: "45 0 * * *"
  workflow_dispatch:

concurrency:
  group: profile-readme-updates
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-dbuzatto-terminal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install github-readme-terminal requests

      - name: Generate GIF (default theme)
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          python scripts/generate_dbuzatto_terminal.py

      - name: Convert GIF to monochrome
        run: |
          ffmpeg -y -i output.gif -vf format=gray assets/dbuzatto-terminal.gif

      - name: Commit GIF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/dbuzatto-terminal.gif
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: update dbuzatto terminal gif"
          git pull --rebase origin main
          git push origin HEAD:main
